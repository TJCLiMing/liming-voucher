<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黎明教會付款申請單（代傳票）</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef0f3; --panel:#ffffff; --ink:#20242b; --muted:#6b7280;
    --line:#d7dbe0; --accent:#39506e; --accent-ink:#fff;
    --paper:#ffffff; --paper-ink:#1a1a1a; --paper-line:#2b2b2b;
    --danger:#b23a3a; --ok:#2f7a4e;
    --sans:"Noto Sans TC",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;
    --serif:"Noto Serif TC","Songti TC","SimSun",serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  .app{display:grid;grid-template-columns:400px 1fr;min-height:100vh}
  @media (max-width:900px){.app{grid-template-columns:1fr}}

  /* ---- editor ---- */
  .editor{background:var(--panel);border-right:1px solid var(--line);padding:20px 18px 40px;overflow:auto}
  .editor h1{font-size:16px;font-weight:700;margin:0 0 2px}
  .editor .sub{color:var(--muted);font-size:12px;margin:0 0 18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px}
  .field input,.field select,
  .item .grid input,.item .grid select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus,
  .item .grid input:focus,.item .grid select:focus{outline:2px solid var(--accent);outline-offset:0;border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .items-head{display:flex;align-items:center;justify-content:space-between;margin:20px 0 8px}
  .items-head h2{font-size:13px;font-weight:700;margin:0}
  .item{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;position:relative}
  .item .item-no{position:absolute;top:-9px;left:10px;background:var(--panel);padding:0 6px;font-size:11px;color:var(--muted)}
  .item .del{position:absolute;top:8px;right:8px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px}
  .item .del:hover{color:var(--danger)}
  .item .grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:2px}
  .amt-wrap{position:relative}
  .amt-wrap .cur{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
  .amt-wrap input{padding-left:26px;text-align:right}

  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 12px;border-radius:8px;cursor:pointer;font:inherit;font-weight:500}
  .btn:hover{background:#f6f7f9}
  .btn.small{padding:5px 10px;font-size:12px}
  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.block{width:100%;justify-content:center}
  .actions{display:grid;gap:10px;margin-top:20px}
  .actions .hint{margin:0;font-size:11px;color:var(--muted);line-height:1.5}
  .total-box{display:flex;align-items:baseline;justify-content:space-between;padding:12px 14px;background:#f6f7f9;border-radius:10px;margin-top:6px}
  .total-box .lbl{font-size:12px;color:var(--muted)}
  .total-box .val{font-family:var(--serif);font-size:22px;font-weight:700}
  .warn{color:var(--danger);font-size:12px;margin-top:8px;display:none}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:8px;opacity:0;transition:.25s;pointer-events:none;z-index:50;font-size:13px}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40;align-items:center;justify-content:center}
  .modal.show{display:flex}
  .modal-box{background:#fff;border-radius:12px;width:min(680px,92vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
  .list-body{overflow:auto;padding:8px 16px 16px}
  .ltable{width:100%;border-collapse:collapse;font-size:13px}
  .ltable th,.ltable td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left}
  .ltable th{color:var(--muted);font-weight:500}
  .ltable tr.lrow{cursor:pointer}
  .ltable tr.lrow:hover{background:#f2f5f9}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .modewarn{font-size:11px;color:#9a6b00;background:#fff7e0;border:1px solid #f0dca0;border-radius:8px;padding:7px 10px;margin-bottom:14px}

  /* ---- preview ---- */
  .preview{padding:28px;overflow:auto;display:flex;justify-content:center;align-items:flex-start}
  .sheet{background:var(--paper);color:var(--paper-ink);width:186mm;min-height:150mm;padding:10mm 12mm;
    box-shadow:0 2px 18px rgba(0,0,0,.12);font-family:var(--serif)}
  .sheet .title{text-align:center;font-size:20pt;font-weight:700;letter-spacing:3px;margin:2mm 0 5mm}
  .sheet .meta{display:flex;justify-content:space-between;align-items:flex-end;font-size:11pt;margin-bottom:2mm}
  .sheet .meta .no{min-width:40mm}
  .vtable{width:100%;border-collapse:collapse;table-layout:fixed;font-size:11pt}
  .vtable th,.vtable td{border:1px solid var(--paper-line);padding:1.5mm 2mm;vertical-align:middle}
  .vtable th{font-weight:500;text-align:center;background:#fafafa}
  .col-sub{width:26mm} .col-memo{width:auto} .digit{width:9mm;text-align:center;padding:1mm 0}
  .vtable td.subject{text-align:center} .vtable td.memo{text-align:left;padding-left:2.5mm}
  .vtable td.digit{font-family:var(--serif);font-size:12pt}
  .vtable .amt-head{text-align:center}
  .totalrow td{font-weight:700}
  .totalrow .memo{font-weight:400;text-align:left;color:#333}
  .paste{border:1px solid var(--paper-line);border-top:none;height:34mm;position:relative;font-size:10pt}
  .paste span{position:absolute;top:2mm;left:50%;transform:translateX(-50%);color:#555}
  .signs{display:flex;font-size:11pt;margin-top:6mm;padding:0 1mm}
  .signs span{flex:1}
  .note{font-size:9pt;color:#555;margin-top:2mm;line-height:1.4}

  .toolbar{position:sticky;top:0;display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px}
  @media (max-width:900px){.toolbar{justify-content:center}}

  @media print{
    /* margin:0 讓瀏覽器頁首頁尾（標題/網址/頁碼）沒有空間可印，留白改由 .sheet 自己撐 */
    @page{size:A4 portrait;margin:0}
    body{background:#fff}
    .editor,.toolbar,.no-print{display:none!important}
    .app{display:block}
    .preview{padding:0;display:block}
    .sheet{width:auto;box-shadow:none;padding:12mm 14mm;min-height:0}
  }
</style>
</head>
<body>
<div class="app">

  <!-- ============ EDITOR ============ -->
  <div class="editor">
    <h1>付款申請單填寫</h1>
    <p class="sub">真耶穌教會 黎明教會 · 代傳票</p>

    <div id="modewarn" class="modewarn" style="display:none"></div>

    <div class="row2">
      <div class="field">
        <label>流水號 No</label>
        <input id="no" placeholder="存檔後自動產生（如 11507-01）">
      </div>
      <div class="field">
        <label>日期</label>
        <input id="date" type="date">
      </div>
    </div>

    <div class="field">
      <label>申請人（必填，存紀錄用；列印時留空給實體簽名）</label>
      <input id="applicant" placeholder="請輸入姓名">
    </div>

    <div class="items-head">
      <h2>明細</h2>
      <button class="btn small" id="addItem">＋ 新增一列</button>
    </div>
    <div id="items"></div>

    <div class="total-box">
      <span class="lbl">合計</span>
      <span class="val" id="totalDisplay">$0</span>
    </div>
    <div class="warn" id="warn">金額超過 999,999，超出位數格「拾萬」範圍，請拆單或改匯款。</div>

    <div class="actions">
      <button class="btn primary block" id="print">存檔並列印 / 匯出 PDF</button>
      <div class="row2">
        <button class="btn" id="save">只存檔</button>
        <button class="btn" id="showList">歷史資料</button>
      </div>
      <p class="hint">「存檔並列印」會自動先存進 Google Sheet 取得單號再印；要重印以前的單，請按「歷史資料」。</p>
    </div>
  </div>

  <!-- ============ PREVIEW ============ -->
  <div class="preview">
    <div style="width:186mm;max-width:100%">
      <div class="toolbar no-print">
        <button class="btn small" id="print2">列印 / 匯出 PDF</button>
      </div>
      <div class="sheet" id="sheet"><!-- rendered --></div>
    </div>
  </div>

</div>
<div class="modal" id="listModal">
  <div class="modal-box">
    <div class="modal-head"><b>歷史資料（本月）</b><button class="btn small" id="closeList">關閉</button></div>
    <div id="listBody" class="list-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   設定：填入你的 GAS 部署網址就會改接後端；留空 = 本機示範模式
   ============================================================ */
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxoykK0pO9uIB1BrFY-laAmMrSr7SDZh0D6VWucu8EA1ZUOkU6nO4Q6TT_r8GLJFbqn/exec";

/* 位數欄（對應原始「申請書」範本：拾萬～元） */
const COLS = [
  {label:"拾\n萬", place:100000},
  {label:"萬",    place:10000},
  {label:"千",    place:1000},
  {label:"百",    place:100},
  {label:"十",    place:10},
  {label:"元",    place:1},
];
const MOCK_SUBJECTS = ["伙食費","旅運費","清掃薪資","文具費","郵電費","水電費","修繕費","誌謝金","餐費","印刷費","雜費"];

let SUBJECTS = MOCK_SUBJECTS.slice();
const state = {
  no:"",
  date: new Date().toISOString().slice(0,10),
  applicant:"",
  items:[ blankItem(), blankItem() ]
};
function blankItem(){ return {subject:"", memo:"", amount:""}; }
let dirty = true; // 尚未存檔或存檔後有改動

/* ---------- helpers ---------- */
function num(v){ const n = parseFloat(String(v).replace(/,/g,"")); return isNaN(n)?0:n; }
function fmt(n){ return "$"+Math.round(n).toLocaleString("en-US"); }
function total(){ return state.items.reduce((s,it)=>s+num(it.amount),0); }
function rocDate(iso){
  if(!iso) return {y:"",m:"",d:""};
  const [Y,M,D] = iso.split("-").map(Number);
  return {y:Y-1911, m:M, d:D};
}
function splitDigits(amount){
  const n = Math.round(num(amount));
  const out = COLS.map(()=> "");
  if(n<=0) return out;
  const s = String(Math.min(n,999999));
  const digits = s.split("");
  for(let i=0;i<digits.length;i++){ out[COLS.length-1-i] = digits[digits.length-1-i]; }
  return out;
}
function toast(msg,bad){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background = bad? "var(--danger)":"var(--ink)";
  t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---------- editor render ---------- */
function subjectOptions(sel){
  return `<option value="">— 選科目 —</option>` +
    SUBJECTS.map(s=>`<option value="${s}" ${s===sel?"selected":""}>${s}</option>`).join("");
}
function renderItems(){
  const box=document.getElementById("items");
  box.innerHTML = state.items.map((it,i)=>`
    <div class="item">
      <span class="item-no">第 ${i+1} 列</span>
      ${state.items.length>1?`<button class="del" data-del="${i}" title="刪除">×</button>`:""}
      <div class="grid">
        <select data-i="${i}" data-k="subject">${subjectOptions(it.subject)}</select>
        <input data-i="${i}" data-k="memo" placeholder="摘要（例：7月安息日中餐）" value="${escAttr(it.memo)}">
        <div class="amt-wrap"><span class="cur">$</span>
          <input data-i="${i}" data-k="amount" inputmode="numeric" placeholder="0" value="${it.amount!==""?Number(num(it.amount)).toLocaleString("en-US"):""}">
        </div>
      </div>
    </div>`).join("");
}
function escAttr(s){ return String(s).replace(/"/g,"&quot;"); }

/* ---------- preview render ---------- */
function renderSheet(){
  const t = total();
  const rd = rocDate(state.date);
  const rows = state.items.slice();
  while(rows.length<6) rows.push(blankItem());     // 補空列，維持紙本高度
  const totalD = splitDigits(t);

  const headDigits = COLS.map(c=>`<th class="digit">${c.label.replace("\n","<br>")}</th>`).join("");
  const bodyRows = rows.map(it=>{
    const d = splitDigits(it.amount);
    return `<tr>
      <td class="subject">${it.subject||""}</td>
      <td class="memo">${it.memo||""}</td>
      ${d.map(x=>`<td class="digit">${x}</td>`).join("")}
    </tr>`;
  }).join("");

  document.getElementById("sheet").innerHTML = `
    <div class="title">黎明教會付款申請單（代傳票）</div>
    <div class="meta">
      <div class="no">NO：${state.no||""}</div>
      <div>日期：${rd.y||"　　"} 年 ${rd.m||"　"} 月 ${rd.d||"　"} 日</div>
    </div>
    <table class="vtable">
      <colgroup>
        <col class="col-sub"><col class="col-memo">
        ${COLS.map(()=>`<col class="digit">`).join("")}
      </colgroup>
      <tr>
        <th rowspan="2">科　目</th>
        <th rowspan="2">摘　　要</th>
        <th class="amt-head" colspan="${COLS.length}">金　額</th>
      </tr>
      <tr>${headDigits}</tr>
      ${bodyRows}
      <tr class="totalrow">
        <td class="subject">合計</td>
        <td class="memo">領款人簽名：</td>
        ${totalD.map(x=>`<td class="digit">${x}</td>`).join("")}
      </tr>
    </table>
    <div class="paste"><span>單據黏貼處</span></div>
    <div class="signs">
      <span>教務：</span><span>總務：</span><span>出納：</span><span>申請人：</span>
    </div>
  `;

  document.getElementById("totalDisplay").textContent = fmt(t);
  document.getElementById("warn").style.display =
    (t>999999 || state.items.some(it=>num(it.amount)>999999)) ? "block":"none";
}

function renderAll(){ renderItems(); renderSheet(); }

/* ---------- events ---------- */
document.getElementById("items").addEventListener("input",e=>{
  const el=e.target, i=el.dataset.i, k=el.dataset.k;
  if(i==null) return;
  let v = el.value;
  if(k==="amount") v = v.replace(/[^\d]/g,"");
  state.items[+i][k] = v;
  dirty = true;
  renderSheet();   // 輸入中只更新預覽與合計，不重畫輸入框（避免打字被打斷）
});
// 金額欄離開時才補千分位
document.getElementById("items").addEventListener("focusout",e=>{
  const el=e.target;
  if(el.dataset && el.dataset.k==="amount" && el.dataset.i!=null){
    const v = state.items[+el.dataset.i].amount;
    el.value = v!=="" ? Number(num(v)).toLocaleString("en-US") : "";
  }
});
document.getElementById("items").addEventListener("click",e=>{
  const d=e.target.dataset.del;
  if(d!=null){ state.items.splice(+d,1); if(!state.items.length) state.items.push(blankItem()); dirty=true; renderAll(); }
});
document.getElementById("addItem").onclick=()=>{ state.items.push(blankItem()); dirty=true; renderAll(); };
["no","applicant"].forEach(id=>{
  document.getElementById(id).addEventListener("input",e=>{ state[id]=e.target.value; dirty=true; renderSheet(); });
});
document.getElementById("date").addEventListener("input",e=>{ state.date=e.target.value; dirty=true; renderSheet(); });
document.getElementById("print").onclick=printSheet;
document.getElementById("print2").onclick=printSheet;
document.getElementById("save").onclick=saveVoucher;

/* 列印前自動存檔：沒存過或有改動就先存（拿到 NO 才印）；空白單直接印 */
async function printSheet(){
  const hasContent = state.items.some(it=>it.subject||it.memo||num(it.amount)>0);
  if(GAS_API_URL && hasContent && dirty){
    const ok = await saveVoucher();
    if(!ok) return; // 存檔失敗不印，避免紙本沒有紀錄
  }
  window.print();
}

/* ---------- 已存單據清單（查詢 / 重印） ---------- */
let LIST_CACHE = {};
async function openList(){
  const modal=document.getElementById("listModal");
  const box=document.getElementById("listBody");
  modal.classList.add("show");
  if(!GAS_API_URL){ box.innerHTML="示範模式沒有歷史資料"; return; }
  box.innerHTML="載入中…";
  try{
    const rows = await apiGet("list",{limit:300});
    if(!Array.isArray(rows)||!rows.length){ box.innerHTML="本月尚無資料"; return; }
    const g={}, order=[];
    rows.forEach(r=>{ const n=r["NO"]; if(g[n]==null){ g[n]=[]; order.push(n); } g[n].push(r); });
    order.reverse(); // 新的在上面
    LIST_CACHE = g;
    box.innerHTML = `<table class="ltable">
      <tr><th>NO</th><th>日期</th><th>科目</th><th style="text-align:right">合計</th><th>申請人</th></tr>` +
      order.map(n=>{
        const rs=g[n];
        const t=rs.reduce((s,r)=>s+(Number(r["合計"])||0),0);
        const subs=rs.map(r=>String(r["會計名稱"]||r["科目代號"]||"").trim()).filter(Boolean).join("、");
        return `<tr class="lrow" data-no="${n}">
          <td>${n}</td><td>${r0(rs)["日期"]||""}</td><td>${subs}</td>
          <td style="text-align:right">$${t.toLocaleString("en-US")}</td><td>${r0(rs)["領款人"]||""}</td>
        </tr>`;
      }).join("") + `</table>
      <p style="color:var(--muted);font-size:12px;margin:10px 2px 0">點一筆載入左側表單即可重印。載入後直接列印不會重複存檔；若修改內容再列印，會以新單號另存一筆。</p>`;
  }catch(err){ box.innerHTML="載入失敗："+err.message; }
}
function r0(rs){ return rs[0]||{}; }
function loadVoucher(n){
  const rs=LIST_CACHE[n]; if(!rs||!rs.length) return;
  const roc=String(rs[0]["日期"]||"").split("/"); // 115/07/05
  let prefix="";
  if(roc.length===3){
    state.date=`${(+roc[0])+1911}-${String(roc[1]).padStart(2,"0")}-${String(roc[2]).padStart(2,"0")}`;
    prefix=`${roc[0]}${String(roc[1]).padStart(2,"0")}`;
  }
  state.no = prefix ? `${prefix}-${String(n).padStart(2,"0")}` : String(n);
  state.applicant = String(rs[0]["領款人"]||"");
  state.items = rs.map(r=>({
    subject: String(r["會計名稱"]||r["科目代號"]||"").trim(),
    memo: String(r["摘要"]||""),
    amount: String(Number(r["合計"])||"")
  }));
  if(!state.items.length) state.items=[blankItem()];
  document.getElementById("no").value = state.no;
  document.getElementById("date").value = state.date;
  document.getElementById("applicant").value = state.applicant;
  dirty = false; // 重印不重複存檔
  renderAll();
  document.getElementById("listModal").classList.remove("show");
  toast("已載入 NO "+state.no+"，可直接列印");
}
document.getElementById("showList").onclick=openList;
document.getElementById("closeList").onclick=()=>document.getElementById("listModal").classList.remove("show");
document.getElementById("listModal").addEventListener("click",e=>{
  if(e.target.id==="listModal") e.target.classList.remove("show");
  const tr=e.target.closest("tr.lrow");
  if(tr) loadVoucher(tr.dataset.no);
});

/* ---------- API ---------- */
async function apiGet(action,params={}){
  const q = new URLSearchParams({action,...params}).toString();
  const r = await fetch(GAS_API_URL+"?"+q);
  return r.json();
}
async function apiPost(payload){
  const r = await fetch(GAS_API_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"}, // 避開 CORS preflight
    body: JSON.stringify(payload)
  });
  return r.json();
}

async function loadSubjects(){
  if(!GAS_API_URL) return;
  try{ const res=await apiGet("subjects"); if(Array.isArray(res)&&res.length){ SUBJECTS=res; renderItems(); } }
  catch(err){ console.warn("科目載入失敗",err); }
}
async function suggestNo(){
  if(!GAS_API_URL) return;
  try{ const res=await apiGet("nextno"); if(res&&res.no){ state.no=res.no; document.getElementById("no").value=res.no; renderSheet(); } }
  catch(err){ console.warn("流水號載入失敗",err); }
}

async function saveVoucher(){
  const items = state.items.filter(it=>it.subject||it.memo||num(it.amount)>0);
  if(!items.length){ toast("請至少填一列明細",true); return false; }
  if(items.some(it=>!it.subject)){ toast("每一列明細都要選科目",true); return false; }
  if(!state.applicant.trim()){ toast("請填申請人",true); document.getElementById("applicant").focus(); return false; }
  const rd=rocDate(state.date);
  const payload = {
    action:"save",
    no: state.no || "",
    date: state.date,
    rocDate: `${rd.y}-${String(rd.m).padStart(2,"0")}-${String(rd.d).padStart(2,"0")}`,
    applicant: state.applicant,
    total: total(),
    items: items.map(it=>({subject:it.subject, memo:it.memo, amount:num(it.amount)}))
  };

  if(!GAS_API_URL){
    console.log("要送出的資料：",payload);
    toast("示範模式：資料已印在 Console（未接後端）");
    return true;
  }
  const btn=document.getElementById("save"); btn.disabled=true; btn.textContent="儲存中…";
  const pbtn=document.getElementById("print"); pbtn.disabled=true;
  try{
    const res=await apiPost(payload);
    if(res&&res.ok){
      if(res.no){ state.no=res.no; document.getElementById("no").value=res.no; renderSheet(); }
      dirty = false;
      toast("已存入 Google Sheet（No："+(res.no||"")+"）");
      return true;
    }else{ toast("儲存失敗："+((res&&res.error)||"未知錯誤"),true); return false; }
  }catch(err){ toast("連線失敗："+err.message,true); return false; }
  finally{ btn.disabled=false; btn.textContent="只存檔"; pbtn.disabled=false; }
}

/* ---------- init ---------- */
(function init(){
  document.getElementById("date").value = state.date;
  renderAll();
  if(!GAS_API_URL){
    const w=document.getElementById("modewarn");
    w.style.display="block";
    w.textContent="示範模式：科目為預設清單，存檔只會印在 Console。填入 GAS_API_URL 後即接上 Google Sheet。";
  }
  loadSubjects();
  suggestNo();
})();
</script>
